apiVersion: apps/v1
kind: Deployment
metadata:
  name: mooncake-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mooncake-master
  template:
    metadata:
      labels:
        app: mooncake-master
    spec:
      containers:
        - name: mooncake-master
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - "apt-get update -qq && apt-get install -y --no-install-recommends libibverbs1 libnuma1 librdmacm1 ibverbs-providers && pip install mooncake-transfer-engine && mooncake_master --port 50051"
          ports:
            - containerPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: mooncake-master
spec:
  selector:
    app: mooncake-master
  ports:
    - port: 50051
      targetPort: 50051
