apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 1
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: kvcache-gpu0
      containers:
        - name: modelserver
          securityContext:
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |
              export PATH="/root/.local/bin:$PATH"
              if ! command -v git > /dev/null 2>&1; then
                apt-get update -qq && apt-get install -y -qq git
              fi
              rm -rf /workspace/vllm
              cd /workspace
              git clone --branch objectstore --depth 1 https://github.com/effi-ofer/vllm.git
              cd vllm
              uv venv .venv --python 3.12
              source .venv/bin/activate
              VLLM_USE_PRECOMPILED=1 \
              VLLM_PRECOMPILED_WHEEL_COMMIT=bc150f50299199599673614f80d12a196f377655 \
              uv pip install -e . --torch-backend=auto
              uv pip install nvidia-cuda-runtime-cu12
              CUDA12_LIB=$(python -c "import nvidia.cuda_runtime; print(list(nvidia.cuda_runtime.__path__)[0] + '/lib')")
              export LD_LIBRARY_PATH="${CUDA12_LIB}:${LD_LIBRARY_PATH:-}"
              exec vllm serve \
                meta-llama/Meta-Llama-3.1-70B \
                --tensor-parallel-size 8 \
                --kv-transfer-config '{"kv_connector":"OffloadingConnector","kv_role":"kv_both","kv_connector_extra_config":{"cpu_bytes_to_use":30000000000}}'
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: llm-d-hf-token
                  key: HF_TOKEN
          startupProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            httpGet:
              path: /health
              port: modelserver
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: modelserver
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            limits:
              cpu: "4"
              memory: 300Gi
              nvidia.com/gpu: "8"
            requests:
              cpu: "4"
              memory: 300Gi
              nvidia.com/gpu: "8"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          emptyDir: {}
